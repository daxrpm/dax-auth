# PAM configuration snippet for dax-auth facial authentication
#
# Installation:
#   Copy pam_dax_auth.so to /usr/lib/security/ (or /lib/security/)
#   Add the "auth sufficient" line BEFORE password auth in your PAM stack
#
# Example for /etc/pam.d/sudo:
#
#   auth  sufficient  pam_dax_auth.so
#   auth  required   pam_unix.so try_first_pass
#
# Example for /etc/pam.d/common-auth (Ubuntu/Debian):
#
#   auth  [success=2 default=ignore]  pam_dax_auth.so
#   auth  [success=1 default=ignore]  pam_unix.so nullok try_first_pass
#   auth  requisite                   pam_deny.so
#   auth  required                    pam_permit.so
#
# Example for /etc/pam.d/system-auth (Arch/Fedora):
#
#   auth  sufficient  pam_dax_auth.so
#   auth  required   pam_unix.so try_first_pass nullok
#
# Module options (pass as arguments after the module path):
#
#   fail_open=true   — compatibility mode: return PAM_IGNORE on daemon/I/O errors
#                      (default is fail-closed)
#
# Example with options:
#   auth  sufficient  pam_dax_auth.so fail_open=true
#
# Behavior when daemon is unavailable:
#   Default: returns PAM_AUTH_ERR (fail-closed)
#   With fail_open=true: returns PAM_IGNORE and continues to next PAM module
